<div class="auth-wrapper">
  <div class="auth-inner">
    <div class="auth-flex">
      <!-- Left side: Visual (Vibrant Gradient) -->
      <div class="auth-visual">
        <div class="brand-centered">
          <img src="/donatehub-logo.png" alt="DonateHub">
        </div>
        
        <div class="visual-content">
          <h2 class="visual-title">Bon retour.</h2>
          <p class="tagline">Connectez-vous pour continuer à soutenir votre communauté et donner une seconde vie aux objets.</p>
        </div>

        <div class="illustration">
          <img src="https://illustrations.popsy.co/teal/work-from-home.svg" alt="Illustration">
        </div>
      </div>

      <!-- Right side: Form (Clean White) -->
      <div class="auth-form-container">
        <div class="form-header">
          <span class="pre-title">CONNEXION</span>
          <h2 class="title">Se connecter</h2>
          <p>Bienvenue sur DonateHub Maroc.</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8">
          <div class="form-group">
            <label>Votre Adresse Email</label>
            <div class="input-with-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" formControlName="email" class="input-base" placeholder="Entrez votre email">
            </div>
            <div class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">
              Veuillez entrer une adresse email valide.
            </div>
          </div>

          <div class="form-group">
            <label>Votre Mot de Passe</label>
            <div class="input-with-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input type="password" formControlName="password" class="input-base" placeholder="Entrez votre mot de passe">
            </div>
          </div>

          <div class="error-alert" *ngIf="errorMessage">{{ errorMessage }}</div>

          <button type="submit" class="btn-indigo" [disabled]="loginForm.invalid || loading">
            {{ loading ? 'Connexion en cours...' : 'Se connecter à mon compte' }}
          </button>

          <div class="auth-divider">
            <span>OU</span>
          </div>

          <div class="auth-footer">
            <p>Pas encore de compte ? <a routerLink="/register">Inscrivez-vous ici</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
