spring.application.name=donatehub-backend
server.port=8085

# RDS PostgreSQL — sera remplace par variable d'environnement Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://YOUR_RDS_ENDPOINT:5432/donatehub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:DonateHub2026!}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Upload
server.tomcat.max-http-form-post-size=50MB
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# AI Assistant — meme reseau Docker Compose
ai.assistant.url=http://ai-assistant:8000
