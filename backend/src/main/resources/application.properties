spring.application.name=donatehub-backend
server.port=8085

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/donatehub
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Large Payload Configuration
server.tomcat.max-http-form-post-size=50MB
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# AI Assistant Microservice Configuration
ai.assistant.url=http://ai-assistant:8000
