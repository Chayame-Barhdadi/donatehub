services:
  db:
    image: postgres:15-alpine
    container_name: donatehub-db
    restart: always
    environment:
      POSTGRES_DB: donatehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
