services:
  # ─── PostgreSQL Database ───────────────────────────
  db:
    image: postgres:15-alpine
    container_name: donatehub-db
    restart: always
    environment:
      POSTGRES_DB: donatehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d donatehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: donatehub-backend
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ─── Python AI Assistant Microservice ──────────────
  ai-assistant:
    build:
      context: ./ai-assistant
      dockerfile: Dockerfile
    container_name: donatehub-ai-assistant
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=DonateHub AI Assistant
      - DEBUG=False
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  # ─── Angular Frontend (Nginx) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: donatehub-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
      - ai-assistant

volumes:
  postgres_data:
  uploads_data:
  huggingface_cache:
